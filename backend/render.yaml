services:
  - type: web
    name: skycast-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: PORT
        value: 3001
      - key: OPENWEATHER_API_KEY
        sync: false
      - key: OPENWEATHER_BASE_URL
        value: https://api.openweathermap.org/data/2.5